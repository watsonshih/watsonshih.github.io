{% elsif page.schema_type == "Service" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "name": "Website Design & Development",
  "provider": {
    "@type": "Person",
    "name": "Watson Shih",
    "url": "https://watsonshih.github.io"
  },
  "description": "{{ page.meta_description }}",
  "url": "{{ page.canonical | default: page.url | absolute_url }}"
}
</script>
{% elsif page.schema_type == "CollectionPage" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "{{ page.title }}",
  "description": "{{ page.meta_description }}",
  "url": "{{ page.canonical | default: page.url | absolute_url }}",
  "about": {
    "@type": "Person",
    "name": "Watson Shih",
    "url": "https://watsonshih.github.io"
  }
}
</script>
{% elsif page.schema_type == "Event" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Event",
  "name": "{{ page.event_name | default: page.title }}",
  "description": "{{ page.meta_description }}",
  "url": "{{ page.canonical | default: page.url | absolute_url }}",
  {% if page.event_start %}"startDate": "{{ page.event_start }}",{% endif %}
  {% if page.event_end %}"endDate": "{{ page.event_end }}",{% endif %}
  {% if page.event_location %}
  "location": {
    "@type": "Place",
    "name": "{{ page.event_location }}"
  },
  {% endif %}
  "organizer": {
    "@type": "Person",
    "name": "Watson Shih",
    "url": "https://watsonshih.github.io"
  }
}
</script>
{% endif %}
